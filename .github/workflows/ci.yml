name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Lint & type-check
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-lint-

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Run ruff (lint)
        run: ruff check .

      - name: Run black (format check)
        run: black --check .

      - name: Run mypy (type check)
        run: mypy core/ retrieval/ --ignore-missing-imports

  # --------------------------------------------------------------------------
  # Unit tests
  # --------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-unit-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-unit-

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            -m "not integration and not e2e" \
            --cov=core \
            --cov=retrieval \
            --cov=pipelines \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --no-cov-on-fail

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-unit.xml
          flags: unit
          name: unit-tests
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Integration tests (with Elasticsearch)
  # --------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      elasticsearch:
        image: elasticsearch:8.11.0
        ports:
          - "9200:9200"
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20
          --health-start-period 60s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-integration-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-integration-

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Elasticsearch
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9200/_cluster/health; then
              echo "Elasticsearch is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -m "not e2e" \
            --cov=core \
            --cov=retrieval \
            --cov=apps \
            --cov-report=xml:coverage-integration.xml \
            --no-cov-on-fail
        env:
          ELASTICSEARCH_HOST: localhost
          ELASTICSEARCH_PORT: "9200"

      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-integration.xml
          flags: integration
          name: integration-tests
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Docker builds
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: false
          tags: vectorlift-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dashboard
          push: false
          tags: vectorlift-dashboard:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
