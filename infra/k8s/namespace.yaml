# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: vectorlift
  labels:
    app.kubernetes.io/name: vectorlift
    app.kubernetes.io/managed-by: kubectl
    environment: production
  annotations:
    description: "VectorLift Semantic Search & Ranking Engine"
