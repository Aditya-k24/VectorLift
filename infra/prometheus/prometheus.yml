# =============================================================================
# VectorLift — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s          # How frequently to scrape targets
  evaluation_interval: 15s      # How frequently to evaluate alerting rules
  scrape_timeout: 10s
  external_labels:
    monitor: "vectorlift"
    environment: "production"

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Add alertmanager targets here, e.g.:
          # - alertmanager:9093

# Load alerting rules
rule_files:
  - "/etc/prometheus/alerts.yml"

# =============================================================================
# Scrape Configurations
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # VectorLift API — FastAPI + prometheus-client metrics
  # ---------------------------------------------------------------------------
  - job_name: "vectorlift-api"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "vectorlift-api"
          component: "api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    honor_labels: true

  # ---------------------------------------------------------------------------
  # VectorLift Worker — Kafka consumer metrics
  # ---------------------------------------------------------------------------
  - job_name: "vectorlift-worker"
    static_configs:
      - targets: ["worker:9091"]
        labels:
          service: "vectorlift-worker"
          component: "worker"
    metrics_path: "/metrics"
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # Elasticsearch — built-in prometheus endpoint
  # ---------------------------------------------------------------------------
  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
        labels:
          service: "elasticsearch"
          component: "search-backend"
    metrics_path: "/_prometheus/metrics"
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Qdrant — built-in prometheus metrics
  # ---------------------------------------------------------------------------
  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: "qdrant"
          component: "vector-backend"
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL — via postgres_exporter (if deployed)
  # ---------------------------------------------------------------------------
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
        labels:
          service: "postgres"
          component: "database"
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Redis — via redis_exporter (if deployed)
  # ---------------------------------------------------------------------------
  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
        labels:
          service: "redis"
          component: "cache"
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Kafka — via kafka_exporter (if deployed)
  # ---------------------------------------------------------------------------
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9308"]
        labels:
          service: "kafka"
          component: "streaming"
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          component: "monitoring"
    metrics_path: "/metrics"
    scrape_interval: 30s
