# =============================================================================
# VectorLift — Grafana Dashboard Provider Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: "VectorLift"
    orgId: 1
    folder: "VectorLift"
    folderUid: "vectorlift-dashboards"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
