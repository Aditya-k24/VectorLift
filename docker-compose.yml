version: "3.8"

# =============================================================================
# VectorLift — Production-grade Docker Compose Stack
# =============================================================================
# Services:
#   api           FastAPI search engine
#   dashboard     Streamlit UI
#   worker        Kafka consumer / async processing
#   elasticsearch BM25 / keyword search backend
#   qdrant        Dense vector search backend
#   postgres      Metadata, experiment tracking
#   redis         Result caching
#   zookeeper     Kafka coordination
#   kafka         Event streaming
#   prometheus    Metrics scraping
#   grafana       Metrics visualisation
#
# Usage:
#   cp .env.example .env       # fill in secrets
#   docker compose up -d
#   docker compose exec api python /app/scripts/bootstrap.sh
# =============================================================================

x-restart: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  vectorlift-network:
    driver: bridge
    name: vectorlift-network

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  esdata:
    driver: local
  qdrantdata:
    driver: local
  pgdata:
    driver: local
  grafanadata:
    driver: local
  prometheusdata:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # FastAPI — Search Engine API
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: vectorlift-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Streamlit — Analytics Dashboard
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    container_name: vectorlift-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Kafka Worker — Async Event Consumer
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: vectorlift-worker
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from kafka import KafkaConsumer; print('ok')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Elasticsearch — BM25 / Keyword Search Backend
  # -------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: vectorlift-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=vectorlift-cluster
      - node.name=vectorlift-node-1
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Qdrant — Dense Vector Search Backend
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: vectorlift-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # PostgreSQL — Metadata & Experiment Tracking
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: vectorlift-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vectorlift
      - POSTGRES_USER=vectorlift
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vectorlift_secret}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorlift -d vectorlift"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Redis — Result Caching & Session Store
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vectorlift-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Zookeeper — Kafka Coordination
  # -------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: vectorlift-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - ./data/zookeeper/data:/var/lib/zookeeper/data
      - ./data/zookeeper/log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Kafka — Event Streaming Platform
  # -------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vectorlift-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: vectorlift-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging

  # -------------------------------------------------------------------------
  # Grafana — Metrics Visualisation
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: vectorlift-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=vectorlift
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_LOG_LEVEL=warn
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vectorlift-network
    <<: *restart-policy
    <<: *default-logging
